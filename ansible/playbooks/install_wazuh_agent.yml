---
- name: Installation agent Wazuh sur serveurs Linux
  hosts: linux
  become: yes
  vars:
    wazuh_manager_ip: "10.10.0.105"
  tasks:
    - name: Ajouter la clé GPG Wazuh
      apt_key:
        url: https://packages.wazuh.com/key/GPG-KEY-WAZUH
        state: present

    - name: Ajouter le dépôt Wazuh
      apt_repository:
        repo: "deb https://packages.wazuh.com/4.x/apt/ stable main"
        state: present

    - name: Installer l'agent Wazuh
      apt:
        name: wazuh-agent
        state: present
        update_cache: yes

    - name: Configurer l'adresse du manager Wazuh
      lineinfile:
        path: /var/ossec/etc/ossec.conf
        regexp: '<address>MANAGER_IP</address>'
        line: "<address>{{ wazuh_manager_ip }}</address>"

    - name: Démarrer et activer l'agent Wazuh
      service:
        name: wazuh-agent
        state: started
        enabled: yes
